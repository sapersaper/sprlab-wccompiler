<template>
  <div class="counter">
    <span class="label">{{label}}</span>
    <span class="value">{{count}}</span>
    <button @click="increment">+</button>
    <button @click="decrement">-</button>
  </div>
</template>

<style>
  .counter {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: sans-serif;
  }

  .label {
    font-weight: bold;
  }

  .value {
    font-size: 24px;
    min-width: 40px;
    text-align: center;
  }

  button {
    padding: 4px 12px;
    font-size: 18px;
    cursor: pointer;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #f5f5f5;
  }

  button:hover {
    background: #e0e0e0;
  }
</style>

<script>
  defineProps(['label'])

  const count = 0

  function increment() {
    const count = count + 1
  }

  function decrement() {
    const count = count - 1
  }
</script>
