<div class="lifecycle-demo">
  <h2>Lifecycle Hooks Demo</h2>
  <div class="status">
    <span class="label">Status:</span>
    <span>{{status}}</span>
  </div>
  <div class="timer">
    <span class="label">Timer:</span>
    <span>{{elapsed}}s</span>
  </div>
  <input ref="nameInput" model="internalName" type="text" placeholder="Type your name">
  <div class="greeting">Hello, {{internalName}} {{name}}!</div>
  <button @click="reset">Reset Timer</button>
</div>
