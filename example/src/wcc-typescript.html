<div class="typescript-demo">
  <h2>TypeScript Component</h2>
  <div class="info">
    <span class="label">Title:</span>
    <span class="title-value">{{title}}</span>
  </div>
  <div class="info">
    <span class="label">Count:</span>
    <span class="count-value">{{count}}</span>
  </div>
  <div class="info">
    <span class="label">Doubled:</span>
    <span class="doubled-value">{{doubled}}</span>
  </div>
  <div class="info">
    <span class="label">Last change:</span>
    <span class="change-value">{{lastChange}}</span>
  </div>
  <button @click="handleUpdate">Update</button>
</div>
